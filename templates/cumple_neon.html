<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cumpleaños de {{ festejado }}</title>
    <style>
        body { 
            font-family: 'Courier New', Courier, monospace; 
            background-color: #0a0a0a; 
            color: #fff; 
            text-align: center; 
            padding: 40px; 
        }
        .contenedor { 
            border: 2px solid #0ff; 
            box-shadow: 0 0 15px #0ff, inset 0 0 15px #0ff;
            padding: 40px; 
            border-radius: 10px; 
            max-width: 400px; 
            margin: auto; 
            background: #111; 
        }
        h1 { 
            color: #ff00ff; 
            text-shadow: 0 0 10px #ff00ff; 
            font-size: 2.5em;
        }
        .destacado { color: #0ff; font-weight: bold; font-size: 1.2em; }
    </style>
</head>
<body>
    <div class="contenedor">
        <h1>¡FIESTA NEÓN!</h1>
        <h2>{{ festejado }} cumple {{ edad }} años</h2>
        <p>Prepara tu mejor outfit porque nos vamos de fiesta.</p>
        <hr style="border-color: #333;">
        <p class="destacado">Cuándo: {{ fecha }}</p>
        <p class="destacado">Dónde: {{ lugar }}</p>
        <br>
        <p style="font-size: 0.9em; color: #888;">Dress code: {{ codigo_vestimenta }}</p>
    </div>
</body>
</html>
